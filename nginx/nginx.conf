worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    client_max_body_size 20m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    upstream fastapi {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # ── Root: show FastAPI status JSON ────────────────────────────────────
        location = / {
            proxy_pass         http://fastapi/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── FastAPI docs ──────────────────────────────────────────────────────
        location /docs {
            proxy_pass         http://fastapi/docs;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }

        location /openapi.json {
            proxy_pass         http://fastapi/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
        }

        location /redoc {
            proxy_pass         http://fastapi/redoc;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
        }

        # ── REST API ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://fastapi/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Auth / Sessions / Violations / Reports ────────────────────────────
        location ~ ^/(auth|sessions|violations|proctor|reports)/ {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://fastapi/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            proxy_pass http://fastapi/health;
        }

        # ── Static assets fallback ────────────────────────────────────────────
        location /static/ {
            proxy_pass http://fastapi/static/;
        }
    }
}
